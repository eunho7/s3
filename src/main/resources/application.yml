spring:
  application:
    name: s3-file-api
  datasource:
    url: jdbc:mysql://localhost:3306/s3_file_db?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis:
  mapper-locations: classpath:/mapper/*.xml
  type-aliases-package: com.example.s3files.entity
  configuration:
    map-underscore-to-camel-case: true

aws:
  s3:
    bucket: your-bucket-name
    region: ap-northeast-2
    presigned-url-duration-minutes: 10

springdoc:
  swagger-ui:
    path: /swagger-ui.html
